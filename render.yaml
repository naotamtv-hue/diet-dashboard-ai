# Render Blueprint — diet-dashboard-ai
# Render ダッシュボードで「New > Blueprint」からこのリポジトリを選ぶと自動構成される。
# DATABASE_URL / DATABASE_AUTH_TOKEN / BUILT_IN_FORGE_API_KEY は秘密値なので
# デプロイ時に各自ダッシュボードで入力する(sync:false)。JWT_SECRET は自動生成。
services:
  - type: web
    name: diet-dashboard-ai
    runtime: node
    plan: free
    branch: main
    # ビルド: pnpm導入(corepackの署名バグ回避でnpm直入れ) → 依存 → ビルド → DBマイグレーション(冪等)
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm build && node scripts/db-setup.mjs
    startCommand: node dist/index.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      # セッションJWTのappId。空だと全セッションが無効化されるため必須。
      - key: VITE_APP_ID
        value: diet-dashboard-ai
      # Turso の DB URL (libsql://...) — ダッシュボードで入力
      - key: DATABASE_URL
        sync: false
      # Turso の認証トークン — ダッシュボードで入力
      - key: DATABASE_AUTH_TOKEN
        sync: false
      # セッションJWT署名鍵 — Renderが安全な値を自動生成
      - key: JWT_SECRET
        generateValue: true
      - key: BUILT_IN_FORGE_API_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      # Gemini APIキー — ダッシュボードで入力
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-2.5-flash
      # 無料枠ガード: 1ユーザー1日のAI上限／全体1日のAI上限（超過時は手入力へ誘導）
      - key: AI_DAILY_PER_USER
        value: "15"
      - key: AI_DAILY_GLOBAL
        value: "250"
